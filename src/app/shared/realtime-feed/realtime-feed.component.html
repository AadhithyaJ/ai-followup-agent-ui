<div class="rf-card">

  <!-- Header -->
  <div class="rf-header">
    <div class="rf-header-left">
      <div class="rf-live-dot-wrap">
        <span class="rf-live-dot" [class.rf-dot-on]="connected()" [class.rf-dot-off]="!connected()"></span>
      </div>
      <span class="rf-title">Live Activity Feed</span>
      <span class="rf-status-chip" [class.rf-chip-on]="connected()" [class.rf-chip-off]="!connected()">
        {{ statusText() }}
      </span>
    </div>
    <div class="rf-header-right">
      <button class="rf-btn rf-btn-stop" (click)="disconnect()" *ngIf="connected()" title="Stop">
        <i class="fas fa-stop"></i>
      </button>
      <button class="rf-btn rf-btn-connect" (click)="connect()" *ngIf="!connected()" title="Connect">
        <i class="fas fa-play"></i>
      </button>
      <button class="rf-btn rf-btn-clear" (click)="clearEvents()" title="Clear">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>

  <!-- Event list -->
  <div class="rf-body">

    <!-- Empty state -->
    <div *ngIf="events().length === 0" class="rf-empty">
      <div class="rf-empty-icon">
        <i class="fas fa-satellite-dish"></i>
      </div>
      <p class="rf-empty-text">No events yet</p>
      <p class="rf-empty-sub">{{ connected() ? 'Listening for incoming events…' : 'Connect to start streaming.' }}</p>
    </div>

    <!-- Events -->
    <div class="rf-event-list">
      <div *ngFor="let ev of events()" class="rf-event-row">
        <div class="rf-event-icon-wrap rf-icon-{{ ev.type }}">
          <i [class]="eventIcon(ev.type)"></i>
        </div>
        <div class="rf-event-body">
          <div class="rf-event-top">
            <span class="rf-event-type">{{ ev.type | titlecase }}</span>
            <span class="rf-event-time">{{ ev.timestamp | date:'HH:mm:ss' }}</span>
          </div>
          <div class="rf-event-data">{{ ev.data | json }}</div>
        </div>
      </div>
    </div>

  </div>

</div>
