<aside class="sidebar" *ngIf="auth.isLoggedIn()">
  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="sidebar-logo">
      <i class="fas {{ (branding.config$ | async)?.logoIcon }}"></i>
    </div>
    <div class="sidebar-brand-text">
      <div class="sidebar-app-name">{{ (branding.config$ | async)?.appName }}</div>
      <div class="sidebar-app-sub">{{ (branding.config$ | async)?.appSub }}</div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main</div>
    <a class="sidebar-link" routerLink="/dashboard" routerLinkActive="active">
      <span class="sidebar-link-icon"><i class="fas fa-th-large"></i></span>
      <span class="sidebar-link-label">Dashboard</span>
    </a>
    <a class="sidebar-link" routerLink="/leads" routerLinkActive="active">
      <span class="sidebar-link-icon"><i class="fas fa-users"></i></span>
      <span class="sidebar-link-label">Leads</span>
    </a>
    <a class="sidebar-link" routerLink="/analytics" routerLinkActive="active">
      <span class="sidebar-link-icon"><i class="fas fa-chart-line"></i></span>
      <span class="sidebar-link-label">Analytics</span>
    </a>
    <a class="sidebar-link" routerLink="/workflows" routerLinkActive="active">
      <span class="sidebar-link-icon"><i class="fas fa-sitemap"></i></span>
      <span class="sidebar-link-label">Workflows</span>
    </a>

    <div class="sidebar-section-label" style="margin-top:1rem">System</div>
    <a class="sidebar-link" routerLink="/admin" routerLinkActive="active">
      <span class="sidebar-link-icon"><i class="fas fa-sliders-h"></i></span>
      <span class="sidebar-link-label">Admin</span>
    </a>
    <a class="sidebar-link" routerLink="/settings" routerLinkActive="active">
      <span class="sidebar-link-icon"><i class="fas fa-cog"></i></span>
      <span class="sidebar-link-label">Settings</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar"><i class="fas fa-user"></i></div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">My Account</div>
        <div class="sidebar-user-role">Admin</div>
      </div>
    </div>
    <button class="sidebar-logout" (click)="logout()" title="Logout">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</aside>
