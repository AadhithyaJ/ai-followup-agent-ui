<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg" style="width:100%;max-width:440px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
        <h3 class="fw-bold">Create Account</h3>
        <p class="text-muted">Start your AI revenue journey</p>
      </div>

      <div class="alert alert-danger d-flex align-items-center" *ngIf="error">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Company / Tenant Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-building"></i></span>
            <input type="text" class="form-control" formControlName="tenant_name"
                   placeholder="My Company"
                   [ngClass]="{'is-invalid': form.get('tenant_name')?.invalid && form.get('tenant_name')?.touched}">
            <div class="invalid-feedback">Company name is required.</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" formControlName="email"
                   placeholder="you@company.com"
                   [ngClass]="{'is-invalid': form.get('email')?.invalid && form.get('email')?.touched}">
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" formControlName="password"
                   placeholder="Min 6 characters"
                   [ngClass]="{'is-invalid': form.get('password')?.invalid && form.get('password')?.touched}">
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>
        </div>

        <button class="btn btn-success w-100 py-2" type="submit" [disabled]="loading || form.invalid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i class="fas fa-user-check me-2" *ngIf="!loading"></i>
          {{ loading ? 'Creating account…' : 'Create Account' }}
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Already have an account?
        <a routerLink="/login" class="fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>
