<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg" style="width:100%;max-width:420px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="fas fa-rocket fa-3x text-primary mb-3"></i>
        <h3 class="fw-bold">AI Revenue Engine</h3>
        <p class="text-muted">Sign in to your account</p>
      </div>

      <div class="alert alert-danger d-flex align-items-center" *ngIf="error">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" formControlName="email"
                   placeholder="you@company.com"
                   [ngClass]="{'is-invalid': form.get('email')?.invalid && form.get('email')?.touched}">
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" formControlName="password"
                   placeholder="Your password"
                   [ngClass]="{'is-invalid': form.get('password')?.invalid && form.get('password')?.touched}">
            <div class="invalid-feedback">Password is required.</div>
          </div>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit" [disabled]="loading || form.invalid">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i class="fas fa-sign-in-alt me-2" *ngIf="!loading"></i>
          {{ loading ? 'Signing in…' : 'Sign In' }}
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Don't have an account?
        <a routerLink="/register" class="fw-semibold">Create one</a>
      </p>
    </div>
  </div>
</div>
